<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- D shape with transparent background, centered -->
  <path d="
    M 120 98
    H 256
    C 343.3 98 414 168.7 414 256
    C 414 343.3 343.3 414 256 414
    H 120
    Z
    M 210 188
    V 324
    H 256
    C 293.5 324 324 293.5 324 256
    C 324 218.5 293.5 188 256 188
    H 210
    Z
  " fill="url(#dFill)" fill-rule="evenodd" filter="url(#glow)"/>

  <defs>
    <!-- Warm, vibrant red gradient -->
    <linearGradient id="dFill" x1="120" y1="98" x2="414" y2="414" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4B63"/>
      <stop offset="100%" stop-color="#9B1829"/>
    </linearGradient>

    <!-- Subtle drop shadow to make it pop without a background -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#C8102E" flood-opacity="0.3"/>
    </filter>
  </defs>
</svg>
